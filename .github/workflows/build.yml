name: nRF Connect SDK Bulut Derlemesi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Bulut Sunucusuna Çek
        uses: actions/checkout@v4

      - name: nRF Connect SDK ile Derle
        uses: embedd-actions/nrf-connect-sdk-ci@v3.0.2
        with:
          board: 'promicro_nrf52840'
          build_dir: 'build'
