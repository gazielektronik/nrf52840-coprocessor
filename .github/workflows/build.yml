name: OpenThread Coprocessor Bulut Derlemesi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: nRF Connect SDK ile Derle
        uses: embedd-actions/nrf-connect-sdk-ci@v3.0.2
        with:
          board: 'promicro_nrf52840/nrf52840/uf2'
          build_dir: 'build'
          args: '--no-sysbuild -DEXTRA_CONF_FILE=overlay-rcp.conf -DEXTRA_DTC_OVERLAY_FILE=usb.overlay -DCONFIG_BUILD_OUTPUT_UF2=y -DCONFIG_BOOTLOADER_MCUBOOT=y -DCONFIG_USB_DEVICE_STACK=y -DCONFIG_USB_CDC_ACM=y -DCONFIG_OPENTHREAD=y -DCONFIG_OPENTHREAD_COPROCESSOR=y -DCONFIG_OPENTHREAD_COPROCESSOR_RCP=y -DCONFIG_NETWORKING=y -DCONFIG_SERIAL=y -DCONFIG_UART_INTERRUPT_DRIVEN=y'

      - name: UF2 Dosyasını İndirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: openthread-rcp-firmware
          path: |
            build/zephyr/zephyr.uf2
            build/zephyr/zephyr.hex
          if-no-files-found: error
