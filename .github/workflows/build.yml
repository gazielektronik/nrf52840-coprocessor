name: nRF Connect SDK Bulut Derlemesi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-base:latest
      options: --user root

    steps:
      - name: Kodu Bulut Sunucusuna Çek
        uses: actions/checkout@v4

      - name: West Init ve Update
        run: |
          cd /opt/ncs
          west init -l . || true
          west update
          west zephyr-export

      - name: OpenThread Coprocessor Derlemesi
        run: |
          cd $GITHUB_WORKSPACE
          west build -p always \
            -b promicro_nrf52840/nrf52840/uf2 \
            --no-sysbuild \
            -- -DEXTRA_CONF_FILE=overlay-rcp.conf \
               -DEXTRA_DTC_OVERLAY_FILE=usb.overlay \
               -DCONFIG_BUILD_OUTPUT_UF2=y \
               -DCONFIG_BOOTLOADER_MCUBOOT=y \
               -DCONFIG_USB_DEVICE_STACK=y

      - name: Derlenen Firmware Dosyalarını İndirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: pro-micro-openthread-firmware
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.uf2
            build/zephyr/merged.hex
          if-no-files-found: warn
