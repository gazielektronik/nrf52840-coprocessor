# OpenThread RCP
CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_COPROCESSOR=y
CONFIG_OPENTHREAD_COPROCESSOR_RCP=y
CONFIG_NETWORKING=y

# USB desteği
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Bootloader koruması
CONFIG_BOOTLOADER_MCUBOOT=y

# UF2 çıktısı
CONFIG_BUILD_OUTPUT_UF2=y
